name: scry-guard
version: "1.0.0"
description: "scry's bound (memory-poisoning defense) + meter (Y/M/D drift capture), wired for Hermes Agent. See https://github.com/AnthonE/scry."
author: scry
hooks:
  - pre_llm_call
  - post_api_request
  - post_llm_call
  - pre_tool_call

# Config is freeform YAML this plugin reads itself (Hermes plugins have no
# formal configSchema) from plugins.entries.scry-guard.config in
# ~/.hermes/config.yaml:
#
#   plugins:
#     entries:
#       scry-guard:
#         config:
#           trusted_sources: ["user"]        # default if omitted
#           gated_tools: []                  # default [] (nothing gated)
#             # e.g. [terminal, write_file, patch] — any tool named here
#             # requires a passing, single-use authorize_action call
#             # immediately before it. Call authorize_action again for
#             # each gated call; it does not stay valid for the whole turn.
#           auth_max_age_seconds: 120        # staleness cap on an unconsumed
#                                             # authorization (default 120)
